{% extends 'base.html' %}

{% block title %}Categories{% endblock %}

{% block content %}
<div class="p-4">
    <h1>Categories</h1>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Name</th>
                <th>Slug</th>
                <th>Parent</th>
            </tr>
        </thead>
        <tbody>
            {% for category in categories %}
            <tr>
                <td>{{ category.name }}</td>
                <td>{{ category.slug }}</td>
                <td>{{ category.parent|default:"-" }}</td>
            </tr>
            {% empty %}
            <tr><td colspan="3">No categories yet.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
